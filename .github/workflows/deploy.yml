name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Prepare deployment
        run: |
          mkdir tmp_deploy
          cp index.html tmp_deploy/index.html
          sed -i "s/GEMINI_API_KEY_1_PLACEHOLDER/${{ secrets.GEMINI_API_KEY_1 }}/g" tmp_deploy/index.html
          sed -i "s/GEMINI_API_KEY_2_PLACEHOLDER/${{ secrets.GEMINI_API_KEY_2 }}/g" tmp_deploy/index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./tmp_deploy
          force_orphan: true
