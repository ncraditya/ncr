<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Hub — आदित्य कोचिंग सेंटर</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet">

/* ── यहाँ color बदलो → पूरे quiz का look बदल जाएगा ── */
:root {
  --pink: #ff6eb4;
  --cyan: #00e5ff;
  --lime: #aaff00;
  --orange: #ff9d3d;
  --dark: #04040a;
  --card: #0d0d1f;
  --border: rgba(255,110,180,0.15);
  --text: #f0eeff;
  --text2: #8880a0;
  --accent: #00e5ff;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans Devanagari', sans-serif;
  background: var(--dark);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 15% 10%, rgba(255,110,180,0.05) 0%, transparent 70%),
    radial-gradient(ellipse 50% 50% at 85% 90%, rgba(0,229,255,0.04) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

.header {
  background: rgba(13,13,26,0.92);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 22px 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: sticky;
  top: 0;
  z-index: 100;
}

.header-logo {
  font-family: 'Syne', sans-serif;
  font-size: clamp(18px, 6.5vw, 48px);
  font-weight: 800;
  color: #fff;
  text-decoration: none;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  letter-spacing: 3px;
  width: 100%;
  text-transform: uppercase;
  text-shadow: 0 0 3px #fff8, 0 0 12px #ff6eb422;
}
.header-logo span { color: var(--pink); text-shadow: 0 0 6px #ff6eb466, 0 0 18px #ff6eb422; }

.logo-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  background: var(--cyan);
  animation: pulse 2s ease-in-out infinite;
  box-shadow: 0 0 5px #00e5ff88, 0 0 12px #00e5ff33;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

.back-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 8px 18px;
  border-radius: 6px;
  font-family: 'Noto Sans Devanagari', sans-serif;
  font-size: 13px;
  text-decoration: none;
  transition: all 0.2s;
}
.back-btn:hover { border-color: var(--gold); color: var(--gold); }

main {
  position: relative;
  z-index: 1;
  max-width: 880px;
  margin: 0 auto;
  padding: 48px 20px 80px;
}

.hero {
  text-align: center;
  padding: 0 0 48px;
  animation: fadeUp 0.6s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(170,255,0,0.06);
  border: 1px solid rgba(170,255,0,0.2);
  border-radius: 100px;
  padding: 4px 14px;
  font-size: 12px;
  color: var(--lime);
  margin-bottom: 16px;
  text-shadow: 0 0 5px #aaff0066;
}

.hero h1 {
  font-family: 'Syne', sans-serif;
  font-size: clamp(32px, 7vw, 52px);
  font-weight: 800;
  letter-spacing: -1.5px;
  line-height: 1.1;
  margin-bottom: 12px;
  color: #fff;
  text-shadow: 0 0 3px #fff5, 0 0 12px #ffffff18;
}

.hero h1 .highlight {
  background: linear-gradient(135deg, var(--orange) 0%, var(--pink) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 3px #ff9d3d55) drop-shadow(0 0 8px #ff6eb422);
}

.hero p { color: var(--text2); font-size: 14px; margin-top: 8px; }

.class-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 36px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
  overflow-x: auto;
  scrollbar-width: none;
}
.class-tabs::-webkit-scrollbar { display: none; }

.class-tab {
  background: transparent;
  border: none;
  border-bottom: 2px solid transparent;
  color: var(--text2);
  padding: 12px 20px;
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.25s;
  white-space: nowrap;
  margin-bottom: -1px;
}
.class-tab.active { color: var(--pink); border-bottom-color: var(--pink); text-shadow: 0 0 5px #ff6eb455; }
.class-tab:hover:not(.active) { color: var(--cyan); text-shadow: 0 0 5px #00e5ff33; }

.class-section { display: none; }
.class-section.active { display: block; animation: fadeUp 0.4s ease both; }

.subject-section {
  margin-bottom: 10px;
  background: var(--card);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 14px;
  overflow: hidden;
  transition: border-color 0.3s;
}
.subject-section.open { border-color: rgba(255,110,180,0.2); }

.subject-header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 18px 20px;
  cursor: pointer;
  user-select: none;
  transition: background 0.2s;
}
.subject-header:hover { background: rgba(255,255,255,0.02); }

.subject-icon { font-size: 22px; }

.subject-name {
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: #fff;
  flex: 1;
  text-shadow: none;
}

.subject-count {
  font-size: 11px;
  color: var(--text2);
  background: rgba(255,255,255,0.05);
  padding: 3px 10px;
  border-radius: 100px;
}

.subject-arrow {
  width: 20px; height: 20px;
  border-radius: 50%;
  background: rgba(255,255,255,0.05);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
  color: var(--text2);
  transition: transform 0.3s ease, background 0.2s;
  flex-shrink: 0;
}
.subject-section.open .subject-arrow {
  transform: rotate(180deg);
  background: rgba(0,229,255,0.1);
  color: var(--cyan);
}

/* ── minmax की value बदलो → एक row में ज़्यादा/कम chapter cards आएंगे ── */
.chapter-list {
  display: none;
  padding: 14px;
  grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
  gap: 8px;
  border-top: 1px solid rgba(255,255,255,0.05);
  background: rgba(0,0,0,0.2);
}
.subject-section.open .chapter-list { display: grid; animation: fadeUp 0.3s ease both; }

.chapter-card {
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 10px;
  padding: 11px 12px;
  text-decoration: none;
  color: var(--text2);
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  gap: 10px;
}
/* Ready chapter — highlighted */
a.chapter-card {
  background: rgba(108,60,225,0.15);
  border: 1px solid rgba(108,60,225,0.5);
  color: #fff;
  cursor: pointer;
}
a.chapter-card .chapter-num {
  background: rgba(108,60,225,0.6);
  color: #fff;
}
.chapter-card:hover {
  background: rgba(170,255,0,0.04);
  border-color: rgba(170,255,0,0.25);
  color: var(--text);
  transform: translateY(-1px);
  box-shadow: 0 0 8px rgba(170,255,0,0.08);
}
a.chapter-card:hover {
  background: rgba(108,60,225,0.35);
  border-color: rgba(108,60,225,0.8);
  color: #fff;
  transform: translateY(-2px);
  box-shadow: 0 4px 16px rgba(108,60,225,0.3);
}

.chapter-num {
  width: 34px; height: 34px;
  border-radius: 8px;
  background: rgba(176,106,255,0.12);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Syne', sans-serif;
  font-size: 10px;
  font-weight: 700;
  color: var(--cyan);
  flex-shrink: 0;
  text-shadow: 0 0 5px #00e5ff44;
}

.chapter-name { font-size: 12.5px; font-weight: 500; line-height: 1.4; }

.coming-soon {
  opacity: 0.45;
  cursor: default;
  pointer-events: none;
}

.soon-tag {
  display: inline-block;
  font-size: 9px;
  color: var(--orange);
  background: rgba(255,157,61,0.12);
  border: 1px solid rgba(255,157,61,0.25);
  border-radius: 4px;
  padding: 1px 5px;
  margin-left: 5px;
  vertical-align: middle;
  letter-spacing: 0.3px;
}

.empty-msg {
  grid-column: 1 / -1;
  padding: 20px;
  text-align: center;
  color: var(--text2);
  font-size: 13px;
  border: 1px dashed rgba(255,255,255,0.07);
  border-radius: 10px;
}

.section-label {
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 700;
  color: var(--text2);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.section-label::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.05); }

.footer-glow {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 120px;
  background: linear-gradient(to top, rgba(8,8,16,0.95) 0%, transparent 100%);
  pointer-events: none;
  z-index: 2;
}
</style>
</head>

function buildAll() {
  var container = document.getElementById('quizData');
  container.innerHTML = '';
  var labels = {c10:'Class 10th', c12:'Class 12th', comp:'Competitive Exams'};

  ['c10','c12','comp'].forEach(function(cls) {
    var div = document.createElement('div');
    div.className = 'class-section' + (cls === 'c10' ? ' active' : '');
    div.id = cls;

    var lbl = document.createElement('div');
    lbl.className = 'section-label';
    lbl.textContent = labels[cls];
    div.appendChild(lbl);

    DATA[cls].forEach(function(sub) {
      var sec = document.createElement('div');
      sec.className = 'subject-section';
      sec.id = 'sub-' + sub.id;

      // Ready chapters count karo
      var ready = sub.chapters.filter(function(c){ return c.file !== ''; }).length;

      var hdr = document.createElement('div');
      hdr.className = 'subject-header';
      hdr.onclick = function() { toggleSubject('sub-' + sub.id); };
      hdr.innerHTML =
        '<span class="subject-icon">' + sub.icon + '</span>' +
        '<span class="subject-name">' + sub.name + '</span>' +
        '<span class="subject-count">' + ready + ' / ' + sub.chapters.length + ' Quiz</span>' +
        '<div class="subject-arrow">▾</div>';

      var lst = document.createElement('div');
      lst.className = 'chapter-list';
      lst.id = 'list-' + sub.id;

      var hasAny = false;
      sub.chapters.forEach(function(ch, i) {
        hasAny = true;
        var card;
        if (ch.file) {
          // Ready chapter — clickable link
          card = document.createElement('a');
          card.href = '/' + ch.file;
          card.target = '_blank';
          card.className = 'chapter-card';
        } else {
          // Coming soon — non-clickable
          card = document.createElement('div');
          card.className = 'chapter-card coming-soon';
        }
        card.innerHTML =
          '<div class="chapter-num">CH' + (i+1) + '</div>' +
          '<div class="chapter-name">' + ch.name + (ch.file ? '' : '<span class="soon-tag">जल्द</span>') + '</div>';
        lst.appendChild(card);
      });

      if (!hasAny) {
        var empty = document.createElement('div');
        empty.className = 'empty-msg';
        empty.textContent = '📲 Quizzes जल्द आ रहे हैं...';
        lst.appendChild(empty);
      }

      sec.appendChild(hdr);
      sec.appendChild(lst);
      div.appendChild(sec);
    });

    container.appendChild(div);
  });
}

function switchClass(cls, btn) {
  document.querySelectorAll('.class-section').forEach(function(s) { s.classList.remove('active'); });
  document.querySelectorAll('.class-tab').forEach(function(t) { t.classList.remove('active'); });
  document.getElementById(cls).classList.add('active');
  btn.classList.add('active');
}

function toggleSubject(id) {
  document.getElementById(id).classList.toggle('open');
}

buildAll();
</script>
